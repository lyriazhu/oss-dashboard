# GitHub API Configuration
# Set GITHUB_TOKEN in your environment before running the extractor.
# Example: export GITHUB_TOKEN="your-token"

# Projects to track
projects:
  - name: "Keycloak"
    github_url: "https://github.com/keycloak/keycloak"
    owner: "keycloak"
    repo: "keycloak"
    foundation: "CNCF"
    website: "https://www.keycloak.org"

  - name: "Debezium"
    github_url: "https://github.com/debezium/debezium"
    owner: "debezium"
    repo: "debezium"
    foundation: "Commonhaus Foundation"
    issue_owner: "debezium"
    issue_repo: "dbz"

  - name: "Quarkus"
    github_url: "https://github.com/quarkusio/quarkus"
    owner: "quarkusio"
    repo: "quarkus"
    foundation: "Commonhaus Foundation"

  - name: "Wildfly"
    github_url: "https://github.com/wildfly/wildfly"
    owner: "wildfly"
    repo: "wildfly"
    foundation: "Commonhaus Foundation"
    issue_source: jira
    jira_project_key: WFLY
    # Use the API root URL — not the browser URL — to avoid the v2 probe returning
    # 404 before the v3 fallback is reached (BUG-20).
    jira_base_url: "https://issues.redhat.com"

  - name: "3scale"
    github_url: "https://github.com/3scale"
    owner: "3scale"
    is_org: true
    foundation: "Red Hat"

  # NOTE: individual apache/* single-repo entries are intentionally removed here.
  # The "apache" is_org entry below discovers tomcat, camel, artemis, etc. from
  # the org automatically — having both caused duplicate project ID collisions
  # on every _sync_projects_json run (BUG-31).
  #
  # Apache Artemis uses Jira for issue tracking; add a per-repo override block
  # below the is_org entry so extract_org_project.py picks it up (BUG-34).

  - name: "strimzi"
    github_url: "https://github.com/strimzi"
    owner: "strimzi"
    is_org: true
    foundation: "CNCF"
    issue_scope: all

  - name: "streamshub"
    github_url: "https://github.com/streamshub"
    owner: "streamshub"
    is_org: true
    foundation: "Independent"
    issue_scope: all

  - name: "Quarkiverse"
    github_url: "https://github.com/quarkiverse/quarkiverse"
    owner: "quarkiverse"
    repo: "quarkiverse"
    foundation: "Commonhaus Foundation"


  - name: "Apache Artemis"
    github_url: "https://github.com/apache/artemis"
    owner: "apache"
    repo: "artemis"
    foundation: "Apache Software Foundation"
    issue_source: jira
    jira_project_key: ARTEMIS
    jira_base_url: "https://issues.apache.org/jira"


  - name: "Apache Tomcat"
    github_url: "https://github.com/apache/tomcat"
    owner: "apache"
    repo: "tomcat"
    foundation: "Apache Software Foundation"



  - name: "Apache Camel"
    github_url: "https://github.com/apache/camel"
    owner: "apache"
    repo: "camel"
    foundation: "Apache Software Foundation"
    issue_source: jira
    jira_project_key: CAMEL
    jira_base_url: "https://issues.apache.org/jira"



  - name: "kroxylicious"
    github_url: "https://github.com/kroxylicious"
    owner: "kroxylicious"
    is_org: true
    foundation: "Independent"

  - name: "Apicurio"
    github_url: "https://github.com/Apicurio"
    owner: "Apicurio"
    is_org: true
    foundation: "Independent"
